name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run parser tests
      # Les tests sont sans dépendance (node:test + parser.js pur) : pas de npm ci.
      run: |
        cd hprim-electron
        npm test

  build-windows:
    needs: [test]
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: hprim-electron/package-lock.json

    - name: Install dependencies
      run: |
        cd hprim-electron
        npm ci

    - name: Build Windows packages
      run: |
        cd hprim-electron
        npm run build -- --win --x64 --publish never

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-windows
        path: |
          hprim-electron/dist/*.exe
          hprim-electron/dist/latest.yml
          hprim-electron/dist/*.exe.blockmap
        if-no-files-found: warn

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          packages-windows/*.exe
          packages-windows/latest.yml
          packages-windows/*.exe.blockmap
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
