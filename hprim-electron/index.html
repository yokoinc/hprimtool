<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; base-uri 'none'; form-action 'none'">
    <title>HPRIM Tool - Analyseur de résultats médicaux</title>
    <script src="theme-init.js"></script>
    <style>
        /* ============================================================
           HPRIM Tool — design « clinique épuré »
           Tokens clair/sombre, surfaces plates, accent bleu médical
           ============================================================ */
        :root, [data-theme="light"] {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --border: #e2e8f0;
            --border-soft: #f1f5f9;
            --text: #0f172a;
            --text-2: #475569;
            --text-3: #64748b;
            --text-4: #94a3b8;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --accent-weak: #eff6ff;
            --high: #dc2626;
            --high-text: #b91c1c;
            --high-bg: #fef2f2;
            --high-border: #fecaca;
            --high-chip: #fee2e2;
            --low: #d97706;
            --low-text: #b45309;
            --low-bg: #fffbeb;
            --low-border: #fde68a;
            --low-chip: #fef3c7;
            --ok: #15803d;
            --ok-bg: #f0fdf4;
            --ok-border: #bbf7d0;
            --band: #bbf7d0;
            --marker-ok: #15803d;
            --track: #e2e8f0;
            --mark-hl: #fde68a;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #18233a;
            --border: #334155;
            --border-soft: #283449;
            --text: #e2e8f0;
            --text-2: #cbd5e1;
            --text-3: #94a3b8;
            --text-4: #64748b;
            --accent: #3b82f6;
            --accent-strong: #60a5fa;
            --accent-weak: #1e2b45;
            --high: #f87171;
            --high-text: #fca5a5;
            --high-bg: #2a1518;
            --high-border: #7f1d1d;
            --high-chip: #450a0a;
            --low: #fbbf24;
            --low-text: #fcd34d;
            --low-bg: #2a2108;
            --low-border: #854d0e;
            --low-chip: #451a03;
            --ok: #4ade80;
            --ok-bg: #112318;
            --ok-border: #166534;
            --band: #1f5135;
            --marker-ok: #4ade80;
            --track: #334155;
            --mark-hl: #92711a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 0;
            cursor: default;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .container { max-width: 980px; margin: 0 auto; padding: 14px 18px 18px; }

        /* ---------- Barre de titre custom (fenêtre sans cadre) ---------- */
        .titlebar {
            display: flex; align-items: center; justify-content: flex-end;
            height: 32px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            user-select: none;
        }
        .titlebar-controls { display: flex; height: 100%; -webkit-app-region: no-drag; }
        .winctl {
            width: 44px; height: 100%;
            border: none; background: transparent;
            color: var(--text-2); font-size: 14px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .winctl:hover { background: var(--surface-2); }
        .winctl-close:hover { background: #e81123; color: #fff; }

        /* ---------- En-tête application ---------- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 13px 18px;
            margin-bottom: 12px;
            -webkit-app-region: drag;   /* fenêtre sans cadre : l'en-tête sert à déplacer */
        }
        /* les boutons restent cliquables (non-drag) */
        .app-header .btn { -webkit-app-region: no-drag; }

        .app-brand { display: flex; align-items: center; gap: 11px; }

        .app-logo {
            width: 36px; height: 36px;
            border-radius: 5px;
            background: var(--accent-weak);
            color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .app-title { font-size: 16px; font-weight: 500; letter-spacing: -0.2px; color: var(--text); }
        .app-subtitle { font-size: 12px; color: var(--text-3); margin-top: 1px; }

        .app-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .icon { width: 16px; height: 16px; flex-shrink: 0; }
        .icon-lg { width: 21px; height: 21px; }
        .icon-sm { width: 14px; height: 14px; }

        /* ---------- Boutons ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            color: var(--text-2);
            border: 1px solid var(--border);
            padding: 7px 13px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
        }
        .btn:hover { background: var(--surface-2); border-color: var(--text-4); }
        .btn:active { background: var(--border-soft); }
        .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn:disabled:hover { background: var(--surface); border-color: var(--border); }

        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
        .btn-primary:active:not(:disabled) { background: var(--accent-strong); }

        .btn-danger { color: var(--high-text); }
        .btn-danger:hover { background: var(--high-bg); border-color: var(--high-border); }

        /* ---------- Zone de dépôt ---------- */
        .drop-zone {
            border: 1.5px dashed var(--border);
            border-radius: 6px;
            padding: 38px;
            margin: 12px 0;
            text-align: center;
            background: var(--surface);
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .drop-zone:hover { border-color: var(--accent); background: var(--surface-2); }
        .drop-zone.dragover { border-color: var(--accent); background: var(--accent-weak); }
        .drop-zone:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        .drop-zone h3 { font-size: 1.05rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
        .drop-zone p { color: var(--text-3); font-size: 0.9rem; margin: 6px 0; }
        .drop-zone .drop-formats { font-size: 0.8rem; color: var(--text-4); margin-top: 14px; line-height: 1.5; }

        .drop-zone.compact { padding: 14px 18px; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 14px; }
        .drop-zone.compact h3 { font-size: 0.95rem; margin: 0; }

        /* ---------- Barre de recherche ---------- */
        .search-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            margin: 12px 0;
        }
        .search-row { display: flex; align-items: center; gap: 10px; }
        .search-input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--surface-2);
            color: var(--text);
        }
        .search-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
        .search-stats { font-size: 0.8rem; color: var(--text-3); margin-top: 8px; }

        /* ---------- Carte patient ---------- */
        .patient-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px 18px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .patient-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent-weak);
            color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 500; font-size: 15px;
            flex-shrink: 0;
        }
        .patient-info { flex: 1; min-width: 0; }
        .patient-identity { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .patient-name { font-size: 16px; font-weight: 500; color: var(--text); }
        .patient-sub { font-size: 13px; color: var(--text-3); }
        .patient-meta { display: flex; gap: 16px; margin-top: 5px; font-size: 12px; color: var(--text-3); flex-wrap: wrap; }
        .patient-meta span { display: inline-flex; align-items: center; gap: 5px; }
        .patient-warning { color: var(--low-text); font-size: 12px; margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; }

        /* ---------- Bandeau de synthèse ---------- */
        .summary-bar { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .summary-chip {
            display: flex; align-items: center; gap: 9px;
            border-radius: 5px;
            padding: 9px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .summary-num { font-size: 19px; font-weight: 500; line-height: 1; }
        .summary-label { font-size: 11.5px; }
        .summary-chip.high { background: var(--high-bg); border-color: var(--high-border); }
        .summary-chip.high .summary-num, .summary-chip.high .summary-label { color: var(--high-text); }
        .summary-chip.low { background: var(--low-bg); border-color: var(--low-border); }
        .summary-chip.low .summary-num, .summary-chip.low .summary-label { color: var(--low-text); }
        .summary-chip.ok { background: var(--ok-bg); border-color: var(--ok-border); }
        .summary-chip.ok .summary-num, .summary-chip.ok .summary-label { color: var(--ok); }

        /* ---------- Liste des résultats ---------- */
        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .result-group-header {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 16px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            font-size: 11px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: var(--text-3);
        }
        .result-group-header:not(:first-child) { border-top: 1px solid var(--border); }

        .result-item {
            display: grid;
            grid-template-columns: minmax(140px, 1.1fr) minmax(130px, 1.5fr) minmax(108px, auto);
            gap: 16px;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid var(--border-soft);
            position: relative;
        }
        .result-item:first-child { border-top: none; }
        .result-item.is-high { background: var(--high-bg); box-shadow: inset 3px 0 0 var(--high); }
        .result-item.is-low { background: var(--low-bg); box-shadow: inset 3px 0 0 var(--low); }

        .result-name {
            font-size: 13px; font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase; letter-spacing: 0.3px;
        }

        /* Colonne centrale : barre de position OU normes texte */
        .result-mid { min-width: 0; }
        .result-range { width: 100%; }
        .range-track { position: relative; height: 6px; background: var(--track); border-radius: 3px; }
        .range-band { position: absolute; left: 18%; right: 18%; top: 0; bottom: 0; background: var(--band); border-radius: 3px; }
        .range-marker {
            position: absolute; top: 50%;
            width: 11px; height: 11px;
            margin: -5.5px 0 0 -5.5px;
            border-radius: 50%;
            background: var(--marker-ok);
            border: 2px solid var(--surface);
        }
        .range-marker.is-high { background: var(--high); }
        .range-marker.is-low { background: var(--low); }
        .range-scale { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-4); margin-top: 3px; }
        .result-mid:has(.result-range) > .result-norms { display: none; }
        .result-norms { font-size: 12.5px; color: var(--text-3); }

        .result-value-container { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        /* Nombre aligné à droite sur un axe fixe, unité alignée à gauche sur un axe fixe :
           les valeurs forment une colonne nette quelle que soit la longueur de l'unité. */
        .value-line { display: flex; align-items: baseline; gap: 6px; }
        .result-number { font-size: 16px; font-weight: 500; color: var(--text); text-align: right; min-width: 52px; }
        .result-unit { font-size: 11px; color: var(--text-4); text-align: left; min-width: 64px; }
        .result-item.is-high .result-number { color: var(--high-text); }
        .result-item.is-low .result-number { color: var(--low-text); }

        /* Valeur qualitative (texte) : alignée à gauche, occupe la zone valeur+norme */
        .result-item.qualitative .result-mid { display: none; }
        .result-item.qualitative .result-value-container { grid-column: 2 / -1; align-items: flex-start; }
        .result-item.qualitative .result-number { text-align: left; min-width: 0; }
        .result-item.qualitative .value-line { white-space: normal; }

        /* Commentaire rattaché à un résultat */
        .result-comment {
            grid-column: 1 / -1;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-3);
            line-height: 1.45;
            font-style: italic;
        }

        /* Résultats texte libre (interprétation, conclusion…) */
        .result-item.text-result { display: block; background: var(--surface-2); }
        .text-result-title {
            display: flex; align-items: center; gap: 7px;
            font-size: 11.5px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-2); margin-bottom: 5px;
        }
        .text-result-body { font-size: 13px; color: var(--text-2); line-height: 1.55; }

        /* Pied : bouton fichier brut */
        .raw-footer { text-align: center; margin-top: 14px; }

        mark[data-search-highlight] { background: var(--mark-hl); color: inherit; padding: 1px 2px; border-radius: 3px; }

        /* ============================================================
           Impression — sobre, lisible, économe en encre
           ============================================================ */
        @media print {
            body { background: #fff; color: #000; padding: 0; font-size: 9pt; }
            .container { max-width: none; margin: 0; }
            .titlebar, .app-header, .drop-zone, .search-bar, .summary-bar, .raw-footer, .result-range { display: none !important; }

            .patient-card {
                border: none; border-bottom: 1px solid #999; border-radius: 0;
                padding: 0 0 8px; margin: 0 0 10px; background: #fff;
            }
            .patient-avatar { display: none; }
            .patient-name { font-size: 12pt; color: #000; }
            .patient-sub, .patient-meta, .patient-meta span { color: #333; font-size: 8.5pt; }

            .results-card { border: none; border-radius: 0; background: #fff; }
            .result-group-header { background: #fff; color: #000; border: none; border-bottom: 1px solid #999; padding: 6px 0 2px; }

            /* Flex + align-items:baseline : valeur ET norme sur la même ligne de base
               (le grid plaçait la norme sur une 2e ligne). */
            .result-item {
                display: flex;
                align-items: baseline;
                flex-wrap: wrap;
                column-gap: 14px;
                padding: 3px 0;
                border-top: none;
                border-bottom: 1px dotted #ccc;
                background: #fff !important;
                box-shadow: none !important;
                page-break-inside: avoid; break-inside: avoid;
            }
            .result-name { color: #000; font-size: 8.5pt; order: 1; flex: 1 1 auto; }
            /* display:block (pas flex-colonne) : sinon la ligne de base est synthétisée
               en bas du bloc et la norme se décale sous la valeur. */
            /* Largeurs FIXES pour valeur et norme + alignées à droite : elles forment
               des colonnes nettes en descendant la page (et non plus en drapeau). */
            .result-value-container { display: block; order: 2; flex: 0 0 120px; }
            /* nombre aligné à droite / unité alignée à gauche -> sous-colonnes nettes */
            .value-line { justify-content: flex-end; }
            .result-number { color: #000; font-size: 8.5pt; text-align: right; min-width: 46px; }
            .result-unit { color: #000; font-size: 8.5pt; text-align: left; min-width: 58px; }
            .result-mid { order: 3; flex: 0 0 150px; }
            .result-comment { order: 4; flex: 1 1 100%; }   /* commentaire en pleine largeur, sous la ligne */
            .result-mid:has(.result-range) > .result-norms { display: block; }
            /* norme : min aligné à droite, tiret, max aligné à gauche -> les tirets s'alignent */
            .result-norms { color: #333; font-size: 8.5pt; text-align: left; white-space: nowrap; }
            .norm-min { display: inline-block; min-width: 30px; text-align: right; }
            .norm-max { display: inline-block; text-align: left; }
            .result-item.is-high .result-number, .result-item.is-low .result-number { color: #000; font-weight: 700; }
            /* Valeur texte en impression : à gauche, juste après le nom */
            .result-item.qualitative .result-mid { display: none; }
            .result-item.qualitative .result-name { flex: 0 1 auto; }
            .result-item.qualitative .result-value-container { flex: 1 1 auto; }
            .result-item.qualitative .value-line { justify-content: flex-start; }
            .result-item.qualitative .result-number { text-align: left; min-width: 0; }
            .result-comment { color: #333; font-size: 7.5pt; font-style: italic; }
            .result-item.text-result { background: #fff; }
            .text-result-title { color: #000; }
            .text-result-body { color: #000; font-size: 8pt; }
            h1, h2, h3 { page-break-after: avoid; break-after: avoid; }
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 760px) {
            .app-header { flex-direction: column; align-items: stretch; }
            .app-actions { justify-content: flex-start; }
            .result-item { grid-template-columns: 1fr auto; }
            .result-mid { grid-column: 1 / -1; order: 3; }
            .result-value-container { align-items: flex-end; }
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-controls">
            <button class="winctl" data-action="win-min" aria-label="Réduire" title="Réduire">&#x2013;</button>
            <button class="winctl" data-action="win-max" aria-label="Agrandir" title="Agrandir">&#x25A1;</button>
            <button class="winctl winctl-close" data-action="win-close" aria-label="Fermer" title="Fermer">&#x2715;</button>
        </div>
    </div>
    <div class="container">
        <header class="app-header">
            <div class="app-brand">
                <div>
                    <div class="app-title" data-i18n="app.title">HPRIM Tool</div>
                    <div class="app-subtitle" data-i18n="app.subtitle">Analyseur de résultats biologiques</div>
                </div>
            </div>
            <div class="app-actions">
                <button class="btn" data-action="toggle-search" id="searchBtn"><span data-i18n="search.button">Rechercher</span></button>
                <button class="btn" data-action="print" id="printBtn" disabled><span data-i18n="buttons.print">Imprimer</span></button>
                <button class="btn" data-action="export" id="exportBtn" disabled><span data-i18n="buttons.export">Export CSV</span></button>
            </div>
        </header>

        <div class="drop-zone" id="dropZone" tabindex="0" role="button" data-i18n-attr='{"aria-label": "tooltip.drag_drop"}'>
            <h3 data-i18n="dropzone.title">Glissez votre fichier HPRIM ici</h3>
            <p data-i18n="dropzone.or">ou</p>
            <button class="btn" data-action="open" data-i18n="buttons.select_file" data-i18n-attr='{"aria-label": "tooltip.select_dialog"}'>
                Sélectionner un fichier
            </button>
            <p class="drop-formats">
                <span data-i18n="dropzone.formats">Formats acceptés: .hpr, .hpm, .hpm1, .hpm2, .hpm3, .hprim, .txt</span><br>
                <span data-i18n="dropzone.size_limit">Taille maximum: 10 MB</span>
            </p>
        </div>

        <div id="results">
            <!-- Les résultats apparaîtront ici -->
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="parser.js"></script>
    <script src="render.js"></script>
    <script src="search.js"></script>
    <script src="export.js"></script>
    <script src="rawfile.js"></script>
    <script src="renderer.js"></script>
    <script src="init.js"></script>
</body>
</html>
